services:
  - type: web
    name: greek-news-radar
    runtime: node
    plan: starter
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: NODE_ENV
        value: production
      - key: INGESTION_LOOKBACK_HOURS
        value: "36"
